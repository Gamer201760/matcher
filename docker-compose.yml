services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7687:7687" # db
      - "7474:7474" # web
    environment:
      - NEO4J_AUTH=neo4j/123456789
    healthcheck:
      test: [ "CMD", "/var/lib/neo4j/bin/cypher-shell", "-u", "neo4j", "-p", "123456789", "MATCH () RETURN count(*) as count" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: always
  matcher:
    depends_on:
      neo4j:
        condition: service_healthy
    image: matcher:v0.0.1
    ports:
      - "50051:50051"
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=123456789
      - NEO4J_DATABASE=neo4j

